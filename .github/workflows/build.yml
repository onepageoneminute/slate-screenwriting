name: Build installers

# Se ejecuta cuando publicas una etiqueta de versión (p. ej. v1.0.4)
# o manualmente desde la pestaña Actions de GitHub.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm ci

      - name: Construir instalador
        run: npm run dist
        env:
          # No firmar (no tenemos certificados de pago)
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Subir instaladores como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: slate-${{ matrix.os }}
          path: |
            instalador/*.exe
            instalador/*.dmg

      - name: Adjuntar a la Release (solo en etiquetas)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            instalador/*.exe
            instalador/*.dmg
